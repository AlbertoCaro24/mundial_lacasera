<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="¡Enhorabuena! Reclama tu premio de La Casera en la campaña del Mundial 2026.">
    <meta name="theme-color" content="#ca0034">
    <title>Reclama tu Premio · La Casera</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;900&family=Open+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#ca0034',
                            darkRed: '#9e0029',
                            white: '#FFFFFF',
                            cream: '#F9F7F2',
                            blue: '#D0EFFF',
                            yellow: '#efcf6d'
                        }
                    },
                    fontFamily: {
                        sans: ['"Garage Gothic Bold"', 'sans-serif'],
                        display: ['"JHCAudemars-Bold"', 'sans-serif'],
                        body: ['"Open Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @font-face {
            font-family: 'JHCAudemars-Bold';
            src: url('estilos/tipos/JHCAudemars-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Garage Gothic Bold';
            src: url('estilos/tipos/Garage Gothic Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }

        /* Remove default autofill background in webkit */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
        }
    </style>
</head>

<body class="bg-brand-cream text-[#002d72] font-sans antialiased overflow-x-hidden min-h-screen flex flex-col">

    <!-- Minimal Navigation -->
    <nav class="w-full bg-brand-darkRed shadow-lg text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-center items-center h-20 md:h-24">
                <a href="index.html">
                    <img src="estilos/LOGO LC.png" alt="La Casera Logo" class="h-12 md:h-16 w-auto">
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main
        class="flex-grow relative flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-brand-red bg-[length:100%_auto] md:bg-cover"
        style="background-image: url('estilos/FONDO NUEVO ROJA1.png'); background-position: center top; background-repeat: no-repeat;">

        <div class="absolute inset-0 bg-black/30 md:bg-black/20"></div>

        <div class="relative z-10 w-full max-w-2xl">
            <div class="bg-white/10 backdrop-blur-md border border-white/20 p-6 md:p-10 rounded-3xl shadow-2xl">
                <header class="text-center mb-8">
                    <div
                        class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-yellow text-brand-darkRed mb-4 shadow-[0_0_20px_rgba(239,207,109,0.5)]">
                        <i class="fas fa-gift text-3xl"></i>
                    </div>
                    <h1
                        class="text-4xl md:text-5xl font-display font-black text-white uppercase leading-[0.9] tracking-tight drop-shadow-md">
                        ¡Enhorabuena!
                        <span
                            class="block text-brand-yellow mt-2 text-2xl md:text-3xl font-bold tracking-normal font-sans">Reclama
                            tu premio</span>
                    </h1>
                    <p class="text-white/90 text-sm md:text-base mt-4 font-body">
                        Rellena tus datos para recibir tu pack de La Roja.
                    </p>
                </header>

                <form action="#" method="POST" class="promo-form flex flex-col gap-4" novalidate>
                    <div class="input-group grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="relative">
                            <input type="text" id="nombre" name="nombre" placeholder="NOMBRE *" required
                                autocomplete="given-name"
                                class="w-full bg-white text-gray-900 font-body text-base font-semibold rounded-2xl py-3 px-4 shadow-inner focus:outline-none focus:ring-4 focus:ring-brand-yellow/50 transition-all placeholder:text-gray-400 placeholder:font-sans placeholder:font-normal placeholder:text-base uppercase" />
                        </div>
                        <div class="relative">
                            <input type="text" id="apellidos" name="apellidos" placeholder="APELLIDOS *" required
                                autocomplete="family-name"
                                class="w-full bg-white text-gray-900 font-body text-base font-semibold rounded-2xl py-3 px-4 shadow-inner focus:outline-none focus:ring-4 focus:ring-brand-yellow/50 transition-all placeholder:text-gray-400 placeholder:font-sans placeholder:font-normal placeholder:text-base uppercase" />
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder="EMAIL *" required autocomplete="email"
                            class="w-full bg-white text-gray-900 font-body text-base font-semibold rounded-2xl py-3 px-4 shadow-inner focus:outline-none focus:ring-4 focus:ring-brand-yellow/50 transition-all placeholder:text-gray-400 placeholder:font-sans placeholder:font-normal placeholder:text-base uppercase" />
                    </div>

                    <div class="input-group grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="relative">
                            <input type="tel" id="telefono" name="telefono" placeholder="TELÉFONO *" required
                                autocomplete="tel"
                                class="w-full bg-white text-gray-900 font-body text-base font-semibold rounded-2xl py-3 px-4 shadow-inner focus:outline-none focus:ring-4 focus:ring-brand-yellow/50 transition-all placeholder:text-gray-400 placeholder:font-sans placeholder:font-normal placeholder:text-base uppercase" />
                        </div>
                        <div class="relative">
                            <input type="text" id="cp" name="cp" placeholder="CÓDIGO POSTAL *" required
                                autocomplete="postal-code"
                                class="w-full bg-white text-gray-900 font-body text-base font-semibold rounded-2xl py-3 px-4 shadow-inner focus:outline-none focus:ring-4 focus:ring-brand-yellow/50 transition-all placeholder:text-gray-400 placeholder:font-sans placeholder:font-normal placeholder:text-base uppercase" />
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="text" id="direccion" name="direccion" placeholder="DIRECCIÓN COMPLETA *" required
                            autocomplete="street-address"
                            class="w-full bg-white text-gray-900 font-body text-base font-semibold rounded-2xl py-3 px-4 shadow-inner focus:outline-none focus:ring-4 focus:ring-brand-yellow/50 transition-all placeholder:text-gray-400 placeholder:font-sans placeholder:font-normal placeholder:text-base uppercase" />
                    </div>

                    <div class="input-group">
                        <input type="text" id="ciudad" name="ciudad" placeholder="CIUDAD *" required
                            autocomplete="address-level2"
                            class="w-full bg-white text-gray-900 font-body text-base font-semibold rounded-2xl py-3 px-4 shadow-inner focus:outline-none focus:ring-4 focus:ring-brand-yellow/50 transition-all placeholder:text-gray-400 placeholder:font-sans placeholder:font-normal placeholder:text-base uppercase" />
                    </div>

                    <div class="mt-4 flex justify-center">
                        <button type="submit" id="submitBtn"
                            class="group relative w-full md:w-auto flex items-center justify-center gap-2 bg-brand-yellow hover:bg-yellow-300 text-brand-darkRed font-black text-lg md:text-xl py-4 px-10 rounded-2xl shadow-[0_4px_0_rgb(180,83,9)] hover:shadow-[0_2px_0_rgb(180,83,9)] hover:translate-y-[2px] active:shadow-none active:translate-y-[4px] transition-all">
                            SOLICITAR PREMIO
                            <i class="fas fa-paper-plane group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-brand-darkRed text-white py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-xs text-white/50">
            <p>&copy; 2026 La Casera® Tinto de Verano. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        document.querySelector('.promo-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ENVIANDO...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            // Recuperamos el código ganador guardado
            const winningCode = localStorage.getItem('winningCode');
            if (!winningCode) {
                alert('No se encontró el código premiado. Por favor, vuelve a introducirlo.');
                window.location.href = 'index.html';
                return;
            }
            data.code = winningCode; // Añadimos el código a los datos a enviar

            try {
                const API_BASE = window.__API_BASE__ || 'https://lacasera-backend.onrender.com';
                const response = await fetch(`${API_BASE}/api/register-winner`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    // Limpiamos el código usado
                    localStorage.removeItem('winningCode');
                    window.location.href = 'gracias.html';
                } else {
                    alert('Error: ' + result.message);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnText;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Hubo un problema al conectar con el servidor.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });
    </script>

</body>

</html>
