<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="¡Gracias por participar en la campaña La Casera x La Roja! Tu premio está en camino.">
    <meta name="theme-color" content="#ca0034">
    <title>¡Gracias! · La Casera</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;900&family=Open+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#ca0034',
                            darkRed: '#9e0029',
                            white: '#FFFFFF',
                            cream: '#F9F7F2',
                            blue: '#D0EFFF',
                            yellow: '#efcf6d'
                        }
                    },
                    fontFamily: {
                        sans: ['"Garage Gothic Bold"', 'sans-serif'],
                        display: ['"JHCAudemars-Bold"', 'sans-serif'],
                        body: ['"Open Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @font-face {
            font-family: 'JHCAudemars-Bold';
            src: url('estilos/tipos/JHCAudemars-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Garage Gothic Bold';
            src: url('estilos/tipos/Garage Gothic Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }
    </style>
</head>

<body class="bg-brand-cream text-[#002d72] font-sans antialiased overflow-x-hidden min-h-screen flex flex-col">

    <!-- Minimal Navigation -->
    <nav class="w-full bg-brand-darkRed shadow-lg text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-center items-center h-20 md:h-24">
                <a href="index.html">
                    <img src="estilos/LOGO LC.png" alt="La Casera Logo" class="h-12 md:h-16 w-auto">
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main
        class="flex-grow relative flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-brand-red bg-[length:100%_auto] md:bg-cover"
        style="background-image: url('estilos/FONDO NUEVO ROJA1.png'); background-position: center top; background-repeat: no-repeat;">

        <div class="absolute inset-0 bg-black/30 md:bg-black/20"></div>

        <div class="relative z-10 w-full max-w-lg text-center">
            <div
                class="bg-white/10 backdrop-blur-md border border-white/20 p-8 md:p-12 rounded-3xl shadow-2xl flex flex-col items-center">

                <div
                    class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(34,197,94,0.4)] animate-[bounce_1s_ease-in-out]">
                    <i class="fas fa-check text-white text-4xl"></i>
                </div>

                <h1
                    class="text-4xl md:text-5xl font-display font-black text-white uppercase leading-[0.9] tracking-tight drop-shadow-md mb-2">
                    ¡Gracias <br class="md:hidden">por participar!
                </h1>

                <h2 class="text-brand-yellow font-sans text-2xl md:text-3xl font-bold mb-4 drop-shadow-sm">
                    ¡Enhorabuena!
                </h2>

                <p class="text-white/90 text-base md:text-lg font-body mb-8">
                    Tu pack de La Roja está en camino. Pronto recibirás noticias en tu correo electrónico.
                </p>

                <a href="index.html"
                    class="submit-btn group relative inline-flex items-center justify-center gap-2 bg-brand-yellow hover:bg-yellow-300 text-brand-darkRed font-black text-lg py-4 px-8 rounded-2xl shadow-[0_4px_0_rgb(180,83,9)] hover:shadow-[0_2px_0_rgb(180,83,9)] hover:translate-y-[2px] active:shadow-none active:translate-y-[4px] transition-all"
                    style="text-decoration: none;">
                    VOLVER AL INICIO
                    <i class="fas fa-home group-hover:-translate-y-1 transition-transform"></i>
                </a>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-brand-darkRed text-white py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-xs text-white/50">
            <p>&copy; 2026 La Casera® Tinto de Verano. Todos los derechos reservados.</p>
        </div>
    </footer>

</body>

</html>
